<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Club de Tennis - Contact</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <img src="../images/balle-tennis.png" alt="Tennis Ball" class="ball left-ball">
            <h1 class="title">Contactez-nous</h1>
            <img src="../images/balle-tennis.png" alt="Tennis Ball" class="ball right-ball">
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="evenements.html">Événements</a></li>
                <li><a href="coachs.html">Nos Entraîneurs</a></li>
                <li><a href="tarifs.html">Tarifs</a></li>
                <li><a href="horaires.html">Horaires</a></li>
                <li><a href="sponsors.html">Nos Sponsors</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="connexion.html" id="login-link">Se connecter</a></li>
            </ul>
        </nav>
        
        
        
    </header>



    <main>
        <section class="fade-in contact-section">
            <h2>Nous joindre</h2>
            <p class="text_contact">Remplissez le formulaire ci-dessous et nous vous répondrons dans les plus brefs délais.</p>
            <form class="contact-form" action="#" method="post">
                <div class="form-group">
                    <label for="name">Nom *</label>
                    <input type="text" id="name" name="name" required placeholder="Votre nom">
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required placeholder="Votre email">
                </div>
                <div class="form-group">
                    <label for="subject">Sujet *</label>
                    <input type="text" id="subject" name="subject" required placeholder="Sujet de votre message">
                </div>
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" required placeholder="Votre message"></textarea>
                </div>
                <div id="error_div"></div>
                <button type="submit" class="btn_submit">Envoyer</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Club de Tennis. Tous droits réservés.</p>
    </footer>

    <script src="../javascript/regex.js"></script>
    <script src="../javascript/loginStatus.js"></script>
</body>
</html>
